---
layout: default
title: Blog
---

<head>
  <link rel="stylesheet" type="text/css" href="/styles.css">
</head>

<h1>{{ page.title }}</h1>

<h3>Hello, this is my website and blog</h3>

<ul>
    {% for post in site.posts %}
      <li>
        <a href="{{ post.url }}">{{ post.title }}</a>
        <p>{{ post.excerpt }}</p>
      </li>
    {% endfor %}
</ul>
